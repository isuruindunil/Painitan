<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painitan | Modern Filipino Dining</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#f97316',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-black overflow-hidden m-0 p-0 h-screen w-screen">

    <!-- Central Brand Logo Overlay -->
    <div class="absolute inset-0 z-50 pointer-events-none flex items-center justify-center">
        <div
            class="bg-black/60 backdrop-blur-md px-12 py-8 rounded-3xl border border-white/10 animate-reveal flex flex-col items-center shadow-2xl">
            <img src="images/logo.png" alt="Painitan Logo"
                class="h-24 md:h-32 w-auto pointer-events-auto object-contain">
            <p class="text-center text-gray-300 mt-4 font-medium tracking-widest text-sm uppercase">Select Location</p>
        </div>
    </div>

    <div class="split-screen flex-col md:flex-row">

        <!-- Iligan Side -->
        <a href="iligan.html" class="split-side w-full md:w-1/2 h-1/2 md:h-full relative group block">
            <div class="split-bg" style="background-image: url('images/painitan_lugaw_1773123200372.png');"></div>
            <div class="split-overlay"></div>
            <div class="split-content animate-reveal delay-100 flex flex-col items-center justify-center p-8">
                <h2
                    class="text-5xl md:text-7xl font-bold mb-4 font-syne group-hover:-translate-y-2 transition-transform duration-500">
                    Iligan</h2>
                <div class="h-1 w-0 bg-accent group-hover:w-24 transition-all duration-500 mb-6 mx-auto"></div>
                <p
                    class="text-gray-300 text-lg opacity-0 group-hover:opacity-100 group-hover:-translate-y-2 transition-all duration-500 delay-100 font-light">
                    Explore Iligan Branch</p>
            </div>
        </a>

        <!-- Lapu-Lapu Side -->
        <a href="lapulapu.html" class="split-side w-full md:w-1/2 h-1/2 md:h-full relative group block">
            <div class="split-bg" style="background-image: url('images/painitan_tapsilog_1773123184902.png');"></div>
            <div class="split-overlay"></div>
            <div class="split-content animate-reveal delay-200 flex flex-col items-center justify-center p-8">
                <h2
                    class="text-5xl md:text-7xl font-bold mb-4 font-syne group-hover:-translate-y-2 transition-transform duration-500">
                    Lapu-Lapu</h2>
                <div class="h-1 w-0 bg-accent group-hover:w-24 transition-all duration-500 mb-6 mx-auto"></div>
                <p
                    class="text-gray-300 text-lg opacity-0 group-hover:opacity-100 group-hover:-translate-y-2 transition-all duration-500 delay-100 font-light">
                    Explore Lapu-Lapu Branch</p>
            </div>
        </a>

    </div>

</body>

</html>
